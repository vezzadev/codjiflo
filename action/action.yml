name: 'CodjiFlo Iteration Tracker'
description: 'Captures PR iterations for force-push resilient code review'
author: 'CodjiFlo'

branding:
  icon: 'git-pull-request'
  color: 'blue'

inputs:
  github-token:
    description: 'GitHub token with repo and actions permissions'
    required: true
    default: ${{ github.token }}
  pr-number:
    description: 'PR number (for workflow_dispatch triggers)'
    required: false

outputs:
  artifact-name:
    description: 'Name of the uploaded artifact'
    value: codjiflo-pr-${{ github.event.pull_request.number }}-run-${{ github.run_id }}

runs:
  using: 'composite'
  steps:
    # Note: Previous artifact is downloaded via GitHub API in the action code
    # because actions/download-artifact@v4 only works for the current run

    - name: Capture iteration
      id: capture
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ inputs.pr-number || github.event.pull_request.number }}
      run: |
        echo "::debug::Action path: ${{ github.action_path }}"
        echo "::debug::Workspace: ${GITHUB_WORKSPACE}"
        echo "::debug::PR number: ${PR_NUMBER}"
        echo "::debug::Run ID: ${{ github.run_id }}"
        echo "Starting iteration capture for PR #${PR_NUMBER}"
        node ${{ github.action_path }}/dist/bootstrap.js
        echo "Iteration captured successfully"

        # Export outputs for subsequent steps
        echo "artifact-name=codjiflo-pr-${PR_NUMBER}-run-${{ github.run_id }}" >> $GITHUB_OUTPUT

    - name: Verify database
      shell: bash
      run: |
        CODJIFLO_DIR="${GITHUB_WORKSPACE}/codjiflo-data"
        echo "::debug::Checking directory: ${CODJIFLO_DIR}"
        echo "::group::Database verification"
        ls -la "${CODJIFLO_DIR}/" 2>/dev/null || echo "::warning::Directory not found"
        if [ -f "${CODJIFLO_DIR}/iterations.db" ]; then
          DB_SIZE=$(stat -c%s "${CODJIFLO_DIR}/iterations.db")
          echo "::debug::Database path: ${CODJIFLO_DIR}/iterations.db"
          echo "::debug::Database verified: ${DB_SIZE} bytes"
        else
          echo "::error::Database file not found!"
          exit 1
        fi
        echo "::endgroup::"

