name: 'CodjiFlo Iteration Tracker'
description: 'Captures PR iterations for force-push resilient code review'
author: 'CodjiFlo'

branding:
  icon: 'git-pull-request'
  color: 'blue'

inputs:
  github-token:
    description: 'GitHub token with repo and actions permissions'
    required: true
    default: ${{ github.token }}

outputs:
  artifact-name:
    description: 'Name of the uploaded artifact'
    value: codjiflo-pr-${{ github.event.pull_request.number }}

runs:
  using: 'composite'
  steps:
    - name: Download existing artifact
      id: download
      uses: actions/download-artifact@v4
      with:
        name: codjiflo-pr-${{ github.event.pull_request.number }}
        path: ${{ github.workspace }}/.codjiflo
      continue-on-error: true

    - name: Capture iteration
      id: capture
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        cd ${{ github.action_path }}
        npx tsx src/index.ts

        # Export outputs for subsequent steps
        echo "artifact-name=codjiflo-pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT

    - name: Verify and upload database
      shell: bash
      env:
        ARTIFACT_NAME: codjiflo-pr-${{ github.event.pull_request.number }}
      run: |
        CODJIFLO_DIR="${GITHUB_WORKSPACE}/.codjiflo"
        echo "Checking for database file..."
        ls -la "${CODJIFLO_DIR}/" || echo "Directory not found"
        if [ -f "${CODJIFLO_DIR}/iterations.db" ]; then
          echo "Database file exists: $(stat -c%s ${CODJIFLO_DIR}/iterations.db) bytes"
          echo "CODJIFLO_DIR=${CODJIFLO_DIR}" >> $GITHUB_OUTPUT
        else
          echo "ERROR: Database file not found!"
          exit 1
        fi

