name: 'CodjiFlo Iteration Tracker'
description: 'Captures PR iterations, uploads artifact, and updates PR comment'
author: 'CodjiFlo'

branding:
  icon: 'git-pull-request'
  color: 'blue'

inputs:
  github-token:
    description: 'GitHub token with repo and actions permissions'
    required: true
    default: ${{ github.token }}
  pr-number:
    description: 'PR number (for workflow_dispatch triggers)'
    required: false

outputs:
  artifact-id:
    description: 'ID of the uploaded artifact'
  artifact-name:
    description: 'Name of the uploaded artifact'
  iteration-count:
    description: 'Number of iterations captured'

runs:
  using: 'composite'
  steps:
    - name: Capture and upload iteration
      id: capture
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ inputs.pr-number || github.event.pull_request.number }}
        # Required for @actions/artifact to work
        ACTIONS_RUNTIME_TOKEN: ${{ github.token }}
        ACTIONS_RUNTIME_URL: ${{ env.ACTIONS_RUNTIME_URL }}
        GITHUB_RUN_ID: ${{ github.run_id }}
      run: |
        echo "::debug::Action path: ${{ github.action_path }}"
        echo "::debug::Workspace: ${GITHUB_WORKSPACE}"
        echo "::debug::PR number: ${PR_NUMBER}"
        echo "::debug::Run ID: ${{ github.run_id }}"
        node ${{ github.action_path }}/dist/bootstrap.js
