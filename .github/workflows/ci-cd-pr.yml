name: CI/CD Pull Request
permissions:
  contents: read
  actions: read
  checks: read
  pull-requests: write

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to run workflow on'
        required: true
        type: number

env:
  PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}

concurrency:
  group: pr-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

jobs:
  lockfile-check:
    runs-on: ubuntu-slim
    steps:
      - name: Checkout repository
        timeout-minutes: 1
        uses: actions/checkout@v6

      - name: Setup Node.js
        timeout-minutes: 1
        uses: actions/setup-node@v6
        with:
          node-version: "24.15.0" # pinned: 24.16.0 hangs `playwright install` zip extraction
          cache: "npm"

      - name: Verify package-lock.json is normalized
        timeout-minutes: 2
        run: |
          npm install --ignore-scripts
          if ! git diff --exit-code package-lock.json; then
            echo ""
            echo "❌ package-lock.json is not normalized."
            echo "Run 'npm run sync-lockfile' locally and commit the result."
            exit 1
          fi

  lint:
    runs-on: ubuntu-slim
    steps:
      - name: Checkout repository
        timeout-minutes: 1
        uses: actions/checkout@v6

      - name: Setup Node.js
        timeout-minutes: 1
        uses: actions/setup-node@v6
        with:
          node-version: "24.15.0" # pinned: 24.16.0 hangs `playwright install` zip extraction
          cache: "npm"

      - name: Install dependencies
        timeout-minutes: 2
        run: for i in 1 2 3; do npm ci && break || sleep 15; done

      - name: Run linter
        timeout-minutes: 2
        run: npm run lint:check

  typecheck:
    runs-on: ubuntu-slim
    steps:
      - name: Checkout repository
        timeout-minutes: 1
        uses: actions/checkout@v6

      - name: Setup Node.js
        timeout-minutes: 1
        uses: actions/setup-node@v6
        with:
          node-version: "24.15.0" # pinned: 24.16.0 hangs `playwright install` zip extraction
          cache: "npm"

      - name: Install dependencies
        timeout-minutes: 2
        run: for i in 1 2 3; do npm ci && break || sleep 15; done

      - name: Run typecheck
        timeout-minutes: 2
        run: npm run typecheck

  spec-validate:
    runs-on: ubuntu-slim
    steps:
      - name: Checkout repository
        timeout-minutes: 1
        uses: actions/checkout@v6

      - name: Setup Node.js
        timeout-minutes: 1
        uses: actions/setup-node@v6
        with:
          node-version: "24.15.0" # pinned: 24.16.0 hangs `playwright install` zip extraction
          cache: "npm"

      - name: Install dependencies
        timeout-minutes: 2
        run: for i in 1 2 3; do npm ci && break || sleep 15; done

      - name: Validate OpenSpec specs and changes
        timeout-minutes: 1
        run: npm run spec:validate

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        timeout-minutes: 1
        uses: actions/checkout@v6

      - name: Setup Node.js
        timeout-minutes: 1
        uses: actions/setup-node@v6
        with:
          node-version: "24.15.0" # pinned: 24.16.0 hangs `playwright install` zip extraction
          cache: "npm"

      - name: Install dependencies
        timeout-minutes: 2
        run: for i in 1 2 3; do npm ci && break || sleep 15; done

      - name: Run unit tests with coverage
        timeout-minutes: 2
        run: npm run test:coverage

      - name: Download base coverage
        if: always()
        id: download-coverage-baseline
        uses: dawidd6/action-download-artifact@v21
        with:
          workflow: ci-cd-main.yml
          branch: main
          name: coverage-baseline
          path: coverage-baseline
        continue-on-error: true

      - name: Coverage report with delta
        if: always()
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          file-coverage-mode: changes
          pr-number: ${{ env.PR_NUMBER }}
          json-summary-compare-path: ${{ steps.download-coverage-baseline.outcome == 'success' && 'coverage-baseline/coverage-summary.json' || '' }}
          threshold-icons: "{0: '🔴', 70: '🟡', 75: '🔵', 85: '🟢'}"

  wait-for-deployment:
    runs-on: ubuntu-slim
    outputs:
      preview-url: ${{ steps.wait.outputs.preview-url }}
    steps:
      - name: Wait for Cloudflare Workers build + preview URL
        id: wait
        timeout-minutes: 5
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e

          if [ -n "${{ github.event.pull_request.head.sha }}" ]; then
            SHA="${{ github.event.pull_request.head.sha }}"
          else
            SHA=$(gh api repos/${{ github.repository }}/pulls/${{ env.PR_NUMBER }} --jq '.head.sha')
          fi

          echo "Waiting for Cloudflare Workers build for SHA: ${SHA:0:7}"

          # Cloudflare Workers Builds does NOT post a GitHub deployment object.
          # It posts a check run named "Workers Builds: <worker>" whose output
          # summary carries the preview URLs:
          #   Preview URL:       https://<version>-<worker>.<subdomain>.workers.dev  (this exact build)
          #   Preview Alias URL: https://<branch>-<worker>.<subdomain>.workers.dev   (latest on branch)
          # Poll that check run and use the version-specific Preview URL — it is
          # pinned to this build, so no commit-match check is needed downstream.
          for i in $(seq 1 60); do
            RUN=$(gh api "repos/${{ github.repository }}/commits/$SHA/check-runs" \
              --jq '[.check_runs[] | select(.name | startswith("Workers Builds"))] | sort_by(.started_at) | last' 2>/dev/null)
            STATUS=$(echo "$RUN" | jq -r '.status // empty' 2>/dev/null)

            if [ "$STATUS" = "completed" ]; then
              CONCLUSION=$(echo "$RUN" | jq -r '.conclusion // empty')
              if [ "$CONCLUSION" != "success" ]; then
                echo "❌ Workers build did not succeed: ${CONCLUSION:-unknown}"
                exit 1
              fi
              SUMMARY=$(echo "$RUN" | jq -r '.output.summary // empty')
              URL=$(echo "$SUMMARY" | grep -oiP 'Preview URL:\s*\K\S+' | head -1)
              [ -z "$URL" ] && URL=$(echo "$SUMMARY" | grep -oiP 'Preview Alias URL:\s*\K\S+' | head -1)
              if [ -z "$URL" ]; then
                echo "❌ Workers build succeeded but no preview URL in summary:"
                echo "$SUMMARY"
                exit 1
              fi
              echo "✅ Preview ready: $URL"
              echo "preview-url=$URL" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Workers build status: ${STATUS:-pending} (attempt $i/60)"
            sleep 5
          done

          echo "❌ Timeout waiting for Cloudflare Workers build"
          exit 1

      - name: Wait for preview to serve /api/health
        timeout-minutes: 1
        run: |
          # The version-specific preview URL is pinned to this exact build, so a
          # liveness check (HTTP 200) is enough — it cannot serve a stale commit.
          URL="${{ steps.wait.outputs.preview-url }}/api/health"
          for i in $(seq 1 15); do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' "$URL" 2>/dev/null || echo "000")
            if [ "$CODE" = "200" ]; then
              echo "✅ Preview live (200) at $URL"
              exit 0
            fi
            echo "Health check attempt $i/15 (HTTP ${CODE})"
            sleep 2
          done
          echo "❌ Timeout waiting for preview /api/health"
          exit 1

  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        timeout-minutes: 1
        uses: actions/checkout@v6

      - name: Setup Node.js
        timeout-minutes: 1
        uses: actions/setup-node@v6
        with:
          node-version: "24.15.0" # pinned: 24.16.0 hangs `playwright install` zip extraction
          cache: "npm"

      - name: Install dependencies
        timeout-minutes: 2
        run: for i in 1 2 3; do npm ci && break || sleep 15; done

      - name: Install Playwright browsers
        timeout-minutes: 1
        run: npx playwright install --with-deps chromium-headless-shell

      - name: Run E2E tests (mock mode)
        timeout-minutes: 3
        run: npm run test:e2e

  e2e-tests-prod:
    needs: [wait-for-deployment]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        timeout-minutes: 1
        uses: actions/checkout@v6

      - name: Setup Node.js
        timeout-minutes: 1
        uses: actions/setup-node@v6
        with:
          node-version: "24.15.0" # pinned: 24.16.0 hangs `playwright install` zip extraction
          cache: "npm"

      - name: Install dependencies
        timeout-minutes: 2
        run: for i in 1 2 3; do npm ci && break || sleep 15; done

      - name: Install Playwright browsers
        timeout-minutes: 1
        run: npx playwright install --with-deps chromium-headless-shell

      - name: Run E2E tests (prod mode)
        timeout-minutes: 3
        env:
          GITHUB_TOKEN: ${{ github.token }}
          E2E_BASE_URL: ${{ needs.wait-for-deployment.outputs.preview-url }}
        run: npm run test:e2e:prod

  storybook-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        timeout-minutes: 1
        uses: actions/checkout@v6

      - name: Setup Node.js
        timeout-minutes: 1
        uses: actions/setup-node@v6
        with:
          node-version: "24.15.0" # pinned: 24.16.0 hangs `playwright install` zip extraction
          cache: "npm"

      - name: Install dependencies
        timeout-minutes: 2
        run: for i in 1 2 3; do npm ci && break || sleep 15; done

      - name: Install Playwright browsers
        timeout-minutes: 1
        run: npx playwright install --with-deps chromium-headless-shell

      - name: Run storybook tests
        timeout-minutes: 1
        run: npm run test:storybook

  # Preview deployments are handled by Cloudflare Workers Builds (connected via
  # the Cloudflare GitHub integration) — no deploy token needed in CI.

  # Capture iteration data for CodjiFlo iteration tracking
  capture-iteration:
    runs-on: ubuntu-slim
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Capture PR iteration
        id: capture
        uses: ./action
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: ${{ env.PR_NUMBER }}

      - name: Upload iteration artifact
        id: upload
        uses: actions/upload-artifact@v7
        with:
          name: codjiflo-pr-${{ env.PR_NUMBER }}-${{ github.run_id }}
          path: codjiflo-data/
          retention-days: 90

      - name: Update PR comment with artifact ID
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARTIFACT_ID="${{ steps.upload.outputs.artifact-id }}"
          ITERATION_COUNT="${{ steps.capture.outputs.iteration-count }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")

          # Create comment body
          BODY="<!-- codjiflo-data -->
          ### CodjiFlo Iteration Tracking

          **Iterations captured**: ${ITERATION_COUNT}
          **Last updated**: ${TIMESTAMP}
          **Artifact**: \`${ARTIFACT_ID}\`
          **Run ID**: ${{ github.run_id }}

          ---
          <details>
          <summary>What is this?</summary>

          This comment is automatically updated by the [CodjiFlo GitHub Action](https://github.com/codjiflo/action) to enable force-push resilient code review with iteration tracking.

          The artifact referenced above contains iteration data that the CodjiFlo frontend uses to:
          - Track code changes across force-pushes
          - Enable comment persistence across code modifications
          - Allow comparison between any two iterations

          </details>"

          # Find existing comment or create new one
          COMMENT_ID=$(gh api repos/${{ github.repository }}/issues/${{ env.PR_NUMBER }}/comments --jq '.[] | select(.body | contains("<!-- codjiflo-data -->")) | .id')
          if [ -n "$COMMENT_ID" ]; then
            gh api repos/${{ github.repository }}/issues/comments/$COMMENT_ID -X PATCH -f body="$BODY"
          else
            gh api repos/${{ github.repository }}/issues/${{ env.PR_NUMBER }}/comments -f body="$BODY"
          fi

