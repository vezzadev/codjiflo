name: CI/CD Main

permissions:
  contents: read

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  coverage-baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        timeout-minutes: 1
        uses: actions/checkout@v4

      - name: Setup Node.js
        timeout-minutes: 1
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        timeout-minutes: 1
        run: npm ci

      - name: Install action dependencies
        timeout-minutes: 3
        run: cd action && npm ci

      - name: Run unit tests with coverage
        timeout-minutes: 2
        run: npm run test:coverage

      - name: Upload coverage baseline
        uses: actions/upload-artifact@v4
        with:
          name: coverage-baseline
          path: coverage/coverage-summary.json
          retention-days: 10

  deploy-main:
    runs-on: ubuntu-latest
    needs: [coverage-baseline]
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Deploy to Vercel (Production)
        run: npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --meta gitCommitSha=${{ github.sha }}

      - name: Wait for deployment to serve new commit
        run: |
          EXPECTED_COMMIT="${{ github.sha }}"
          URL="https://codjiflo.vza.net/api/health"
          for i in {1..30}; do
            DEPLOYED=$(curl -s "$URL" | jq -r '.commit' 2>/dev/null || echo "")
            if [ "$DEPLOYED" = "$EXPECTED_COMMIT" ]; then
              echo "✅ Deployment ready with commit $EXPECTED_COMMIT"
              exit 0
            fi
            echo "Waiting... (attempt $i/30, got: ${DEPLOYED:-no response})"
            sleep 2
          done
          echo "❌ Timeout waiting for deployment"
          exit 1

  # ============================================================================
  # E2E STRESS TESTS
  # ============================================================================
  # Runs e2e and e2e:prod 10 times each on a single machine.
  # - Parallel: Playwright uses max workers (default: 50% of CPU cores)
  # - Sequential: Playwright uses 1 worker
  # ============================================================================

  e2e-stress-parallel:
    runs-on: ubuntu-latest-16-core
    needs: [deploy-main]
    env:
      CODJIFLO_E2E_GITHUB_TOKEN: ${{ secrets.CODJIFLO_E2E_GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        timeout-minutes: 1
        uses: actions/checkout@v4

      - name: Setup Node.js
        timeout-minutes: 1
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        timeout-minutes: 1
        run: npm ci

      - name: Install Playwright browsers
        timeout-minutes: 1
        run: npx playwright install --with-deps chromium-headless-shell

      - name: Run E2E stress tests (max workers) - 10x
        timeout-minutes: 30
        run: |
          echo "CPU cores: $(nproc), Playwright workers: $(($(nproc) / 2))"
          for i in {1..10}; do
            echo "========================================"
            echo "=== Parallel Run $i/10 (max workers) ==="
            echo "========================================"
            npm run test:e2e
            npm run test:e2e:prod
          done

  e2e-stress-sequential:
    runs-on: ubuntu-latest
    needs: [deploy-main]
    env:
      CODJIFLO_E2E_GITHUB_TOKEN: ${{ secrets.CODJIFLO_E2E_GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        timeout-minutes: 1
        uses: actions/checkout@v4

      - name: Setup Node.js
        timeout-minutes: 1
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        timeout-minutes: 1
        run: npm ci

      - name: Install Playwright browsers
        timeout-minutes: 1
        run: npx playwright install --with-deps chromium-headless-shell

      - name: Run E2E stress tests (1 worker) - 10x
        timeout-minutes: 30
        run: |
          for i in {1..10}; do
            echo "========================================"
            echo "=== Sequential Run $i/10 (1 worker) ==="
            echo "========================================"
            npm run test:e2e -- --workers=1
            npm run test:e2e:prod -- --workers=1
          done
