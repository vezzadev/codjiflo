name: CI/CD Main

permissions:
  contents: read

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  coverage-baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        timeout-minutes: 1
        uses: actions/checkout@v4

      - name: Setup Node.js
        timeout-minutes: 1
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        timeout-minutes: 2
        run: for i in 1 2 3; do npm ci && break || sleep 15; done

      - name: Install action dependencies
        timeout-minutes: 4
        run: for i in 1 2 3; do (cd action && npm ci) && break || sleep 15; done

      - name: Run unit tests with coverage
        timeout-minutes: 2
        run: npm run test:coverage

      - name: Upload coverage baseline
        uses: actions/upload-artifact@v4
        with:
          name: coverage-baseline
          path: coverage/coverage-summary.json
          retention-days: 10

  # Production deployment handled by Vercel GitHub App.
  # This job waits for it to complete before running stress tests.
  deploy-main:
    runs-on: ubuntu-slim
    needs: [coverage-baseline]
    steps:
      - name: Wait for Vercel production deployment
        run: |
          EXPECTED_COMMIT="${{ github.sha }}"
          URL="https://codjiflo.vza.net/api/health"
          for i in {1..60}; do
            DEPLOYED=$(curl -s "$URL" | jq -r '.commit' 2>/dev/null || echo "")
            if [ "$DEPLOYED" = "$EXPECTED_COMMIT" ]; then
              echo "✅ Deployment ready with commit $EXPECTED_COMMIT"
              exit 0
            fi
            echo "Waiting... (attempt $i/60, got: ${DEPLOYED:-no response})"
            sleep 5
          done
          echo "❌ Timeout waiting for Vercel production deployment"
          exit 1

  # ============================================================================
  # E2E STRESS TESTS
  # ============================================================================
  # Runs e2e and e2e:prod with --repeat-each=10 (each test repeated 10 times).
  # - Parallel: Playwright uses max workers (4-vCPU free OSS runner = 2 workers)
  # - Sequential: Playwright uses 1 worker
  # ============================================================================

  e2e-stress-parallel:
    runs-on: ubuntu-latest
    needs: [deploy-main]
    steps:
      - name: Checkout repository
        timeout-minutes: 1
        uses: actions/checkout@v4

      - name: Setup Node.js
        timeout-minutes: 1
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        timeout-minutes: 2
        run: for i in 1 2 3; do npm ci && break || sleep 15; done

      - name: Install Playwright browsers
        timeout-minutes: 1
        run: npx playwright install --with-deps chromium-headless-shell

      - name: Run E2E stress tests (max workers) - 10x
        timeout-minutes: 30
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          echo "CPU cores: $(nproc), Playwright workers: $(($(nproc) / 2))"
          npm run test:e2e -- --repeat-each=10 || MOCK_FAILED=1
          npm run test:e2e:prod -- --repeat-each=10 || PROD_FAILED=1
          [ -z "$MOCK_FAILED" ] && [ -z "$PROD_FAILED" ]

      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-parallel
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore

  e2e-stress-sequential:
    runs-on: ubuntu-latest
    needs: [deploy-main]
    steps:
      - name: Checkout repository
        timeout-minutes: 1
        uses: actions/checkout@v4

      - name: Setup Node.js
        timeout-minutes: 1
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        timeout-minutes: 2
        run: for i in 1 2 3; do npm ci && break || sleep 15; done

      - name: Install Playwright browsers
        timeout-minutes: 1
        run: npx playwright install --with-deps chromium-headless-shell

      - name: Run E2E stress tests (1 worker) - 10x
        timeout-minutes: 30
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          npm run test:e2e -- --workers=1 --repeat-each=10 || MOCK_FAILED=1
          npm run test:e2e:prod -- --workers=1 --repeat-each=10 || PROD_FAILED=1
          [ -z "$MOCK_FAILED" ] && [ -z "$PROD_FAILED" ]

      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-sequential
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore
