name: Janitor

on:
  schedule:
    - cron: '0 14 * * *' # 2pm UTC (6am PST, 7am PDT) daily

  workflow_dispatch:
    inputs:
      task_index:
        description: 'Zero-based task index to create. Leave empty for automatic calculation.'
        required: false
        type: string
      model:
        description: 'AI model for Copilot coding agent'
        required: false
        type: choice
        default: 'claude-opus-4.5'
        options:
          - claude-opus-4.5
          - claude-sonnet-4.5
          - gpt-5.1-codex-max
          - auto

env:
  TASKS: |
    - title: Improve code coverage
      description: |-
        Identify modules with low code coverage and add unit or integration tests to improve coverage
        towards ideally 90%. Tests should focus on important business logic and edge cases.

    - title: Remove unused dependencies
      description: |-
        Look for dependencies in package.json that are not being used in the codebase. Remove them
        and ensure the project still builds and tests pass.

    - title: Refactor duplicated code
      description: |-
        Find duplicated code patterns and extract them into reusable utility functions or components.

    - title: Improve error handling
      description: |-
        Review error handling logic and add edge case handling where it's missing or incomplete.

    - title: Update code comments
      description: |-
        Improve code comments, add missing comments for complex logic, and update outdated ones and remove redundant ones.

    - title: Remove dead code
      description: |-
        Identify and remove unused functions, variables, exports, and dead code branches. Also remove
        one-off debugging code added by accident. Knip, ts-prune, PurgeCSS can help with this.

    - title: Update logging
      description: |-
        Pick a random file in spec/functional and compare it with the source code. Look for important
        checkpoints in the user journey that would benefit from logging. Add or improve logging
        statements to provide better visibility into application behavior.

    - title: Optimize performance
      description: |-
        Profile the application using the test suite, identify performance issues, and implement optimizations.

    - title: Review folder structure
      description: |-
        Pick a random folder in the codebase, inspect its contents and reflect if this is intuitive to
        a junior engineer who has read the README.md, AGENTS.md, and docs/. Suggest improvements if
        needed.

    - title: Strengthen existing tests
      description: |-
        Pick a random test file and inspect the assertions it is performing. Reflect if they are
        actually testing behavior or just making weak assertions that won't fail most of the time. Look
        at the code under test for important business logic and edge cases that should be well covered.
        Add any assertions or extra tests you think are beneficial.

    - title: Streamline E2E tests
      description: |-
        E2E tests are meant to cover the end-to-end user journey when using a feature, both on the
        happy and important unhappy paths. Pick a random E2E test file and look for tests that only
        cover a slice of a feature. Those tests should be converted into functional tests.

    - title: Add missing E2E tests
      description: |-
        E2E tests are meant to cover the end-to-end user journey when using a feature, both on the
        happy and important unhappy paths. Pick a random file in spec/functional to understand what
        is the user journey for that feature. If there are no E2E tests covering that user journey,
        add them.

    - title: Review spec/functional
      description: |-
        Pick a random file in spec/functional and compare it with the source code. Look for important
        behaviors in the code that don't match the spec. Update the spec with more details or
        acceptance tests to make it clearer and more comprehensive.

    - title: Review spec/milestones
      description: |-
        Pick a random file in the codebase and look for a user story that covers that part of the
        codebase. Update spec/milestones if you can't find one or you found important code behaviors
        that are not enumerated in any user story.

    - title: Add/update folder README
      description: |-
        Pick a random folder in the codebase other than the root and see if it represents a well
        defined piece of the product or code architecture. If so, that folder should have a readme.
        Create or update a readme file that describes at a high level what this folder contains and
        what it is meant to do. Don't dwell on minutiae, point to important files with entry points
        or relevant algorithms.

    - title: Update root README.md and AGENTS.md
      description: |-
        README.md files are for humans: quick starts, project descriptions, and contribution
        guidelines. AGENTS.md provide precise, agent-focused guidance for being an effective engineer
        in the codebase. Only AGENTS.md is added to the agent's context therefore it must contain only
        the most important information from README such as project purpose plus sometimes detailed
        information agents need: build steps, tests, conventions and any idiosyncrasies in the code.
        Important: agent context window is precious and so AGENTS.md must be TERSE. Remember that
        coding agents are familiar with common tooling and so this information can be omitted. Add
        links to other files that provide additional clarifications on a specific part of the codebase.
        Inspect README and AGENTS files and then explore the codebase. Add / update / remove
        information to streamline these files.

jobs:
  create-janitor-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - run: npm install yaml

      - name: Calculate and create task
        uses: actions/github-script@v8
        with:
          # Requires user PAT from *user* with Copilot entitlement (license check) and read and write access to
          # actions, contents, issues, and pull requests, and has permission to assign issues to the target repository.
          github-token: ${{ secrets.CODJIFLO_JANITOR_TOKEN }}
          script: |
            const yaml = require('yaml');
            const tasksYaml = `${{ env.TASKS }}`;
            const tasks = yaml.parse(tasksYaml);

            let taskIndex = parseInt('${{ github.event.inputs.task_index }}', 10);
            if (Number.isNaN(taskIndex) || taskIndex < 0 || taskIndex >= tasks.length) {
              const now = new Date();
              const start = new Date(now.getFullYear(), 0, 1);
              const diff = now - start;
              const oneDay = 1000 * 60 * 60 * 24;
              const dayOfYear = Math.floor(diff / oneDay) + 1;

              taskIndex = (dayOfYear - 1) % tasks.length;
            }

            // Query for repository ID and bot ID
            const repoQuery = await github.graphql(`
              query {
                repository(owner: "${context.repo.owner}", name: "${context.repo.repo}") {
                  id
                  suggestedActors(first: 100, capabilities: CAN_BE_ASSIGNED) {
                    nodes {
                      ... on Bot { id login }
                    }
                  }
                }
              }
            `);

            const repositoryId = repoQuery.repository.id;
            const botId = repoQuery.repository.suggestedActors.nodes.find(
              actor => actor.login === 'copilot-swe-agent'
            )?.id;

            if (!botId) {
              throw new Error('Failed to find copilot-swe-agent bot ID in suggestedActors');
            }

            const task = tasks[taskIndex];
            const today = new Date().toISOString().split('T')[0];
            const title = `[Janitor task #${today}]: ${task.title}`;
            const bodyLines = [
              "This is a janitor task. The goal is to make improvements to the codebase without affecting behavior.",
              "",
              "**Today's task is:**",
              "",
              task.title,
              "",
              "**Description:**",
              "",
              task.description,
              "",
              "**Important notes:**",
              "",
              "- Add janitor label to your PR",
              `- If you find something during your work that doesn't make sense, add your questions to \`spec/questions/${today}.md\` and they will be clarified during review.`,
              "- It is perfectly fine to not have anything to change.",
              "- You should only create a pull request if you believe you found something that will significantly improve the maintainability, ease of understanding, or performance of the code."
            ];
            const body = bodyLines.join("\n");

            // Create issue with bot assignment via GraphQL
            const createIssueQuery = await github.graphql(`
              query {
                repository(owner: "${context.repo.owner}", name: "${context.repo.repo}") {
                  labels(first: 100, query: "janitor") {
                    nodes {
                      id
                    }
                  }
                }
              }
            `);

            const janitorLabelId = createIssueQuery.repository.labels.nodes[0]?.id;

            const issueResult = await github.graphql(`
              mutation CreateIssue($input: CreateIssueInput!) {
                createIssue(input: $input) {
                  issue {
                    number
                    url
                    title
                  }
                }
              }
            `, {
              input: {
                repositoryId: repositoryId,
                title: title,
                body: body,
                labelIds: janitorLabelId ? [janitorLabelId] : [],
                assigneeIds: [botId],
                agentAssignment: {
                  targetRepositoryId: repositoryId,
                  baseRef: "main",
                  model: '${{ github.event.inputs.model || 'claude-opus-4.5' }}'
                }
              },
              headers: {
                'GraphQL-Features': 'issues_copilot_assignment_api_support,coding_agent_model_selection'
              }
            });

            core.info(`Created issue #${issueResult.createIssue.issue.number}: ${title}`);
