name: Mirror to Azure DevOps

on:
  workflow_dispatch:
  push:
    branches: ['**']
    tags: ['**']
  delete:
  pull_request:
    types: [opened, closed, reopened, edited, synchronize]
  issue_comment:
    types: [created, edited, deleted]
  pull_request_review_comment:
    types: [created, edited, deleted]
  pull_request_review:
    types: [submitted, edited, dismissed]

concurrency:
  group: azdo-mirror
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AZDO_ORG: pedropaulovc
  AZDO_PROJECT: CodjiFlo
  AZDO_REPO: CodjiFlo

jobs:
  mirror:
    runs-on: ubuntu-slim
    environment: azdo-mirror
    # Skip issue_comment events that are not on PRs
    if: github.event_name != 'issue_comment' || github.event.issue.pull_request != null

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'delete' && 'main' || github.ref }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_AZDO_MIRROR_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_AZDO_MIRROR_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Get Azure DevOps Token
        id: azdo-token
        run: |
          set -e
          # 499b84ac-1321-427f-aa17-267ca6975798 is Azure DevOps Services resource ID
          TOKEN=$(az account get-access-token \
            --resource 499b84ac-1321-427f-aa17-267ca6975798 \
            --query accessToken \
            --output tsv)
          echo "::add-mask::${TOKEN}"
          echo "token=${TOKEN}" >> $GITHUB_OUTPUT

      - name: Mirror Git (branches and tags)
        env:
          AZDO_TOKEN: ${{ steps.azdo-token.outputs.token }}
        run: |
          set -e

          git remote add azdo "https://oauth2:${AZDO_TOKEN}@dev.azure.com/${AZDO_ORG}/${AZDO_PROJECT}/_git/${AZDO_REPO}"

          # Fetch all branches as local branches (checkout only creates one local branch)
          # Detach HEAD first so git allows updating all branches including the current one
          git checkout --detach
          git fetch origin '+refs/heads/*:refs/heads/*'

          # Push all branches and tags
          # --prune removes branches/tags from Azure DevOps that were deleted from GitHub
          # --force handles non-fast-forward updates after force pushes
          git push azdo --all --prune --force
          git push azdo --tags --prune --force

      - name: Sync Pull Requests
        env:
          AZDO_TOKEN: ${{ steps.azdo-token.outputs.token }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e

          AZDO_API="https://dev.azure.com/${AZDO_ORG}/${AZDO_PROJECT}/_apis/git/repositories/${AZDO_REPO}"

          # Fetch all open GitHub PRs
          echo "Fetching GitHub PRs..."
          GH_PRS=$(gh pr list --state open --json number,title,body,url,headRefName,baseRefName)
          echo "  Found $(echo "$GH_PRS" | jq 'length') open GitHub PRs"

          # Fetch all active Azure DevOps PRs
          echo "Fetching Azure DevOps PRs..."
          AZDO_PRS=$(curl -s \
            "${AZDO_API}/pullrequests?searchCriteria.status=active&api-version=7.1" \
            -H "Authorization: Bearer ${AZDO_TOKEN}" \
            | jq '.value // []')
          echo "  Found $(echo "$AZDO_PRS" | jq 'length') active Azure DevOps PRs"

          # Build map of GH PR number -> AzDO PR ID from existing comments
          echo "Building PR mapping from GitHub comments..."
          declare -A GH_TO_AZDO
          for gh_num in $(echo "$GH_PRS" | jq -r '.[].number'); do
            azdo_id=$(gh pr view "$gh_num" --comments --json comments 2>/dev/null \
              | jq -r '.comments[].body // empty' \
              | grep -o '<!-- azdo-mirror:[0-9]*' \
              | sed 's/<!-- azdo-mirror://' \
              | head -1 || true)
            if [ -n "$azdo_id" ]; then
              GH_TO_AZDO[$gh_num]=$azdo_id
              echo "  GH #$gh_num -> AzDO #$azdo_id"
            else
              echo "  GH #$gh_num -> (no AzDO link found)"
            fi
          done

          # Abandon orphaned AzDO PRs BEFORE syncing (to free up branches)
          echo "Checking for orphaned Azure DevOps PRs..."
          # Build list of linked AzDO IDs safely
          LINKED_AZDO_IDS=""
          for key in "${!GH_TO_AZDO[@]}"; do
            LINKED_AZDO_IDS="${LINKED_AZDO_IDS}${GH_TO_AZDO[$key]}"$'\n'
          done

          azdo_pr_count=$(echo "$AZDO_PRS" | jq 'length')
          for ((i=0; i<azdo_pr_count; i++)); do
            azdo_id=$(echo "$AZDO_PRS" | jq -r ".[$i].pullRequestId")
            azdo_desc=$(echo "$AZDO_PRS" | jq -r ".[$i].description // \"\"")

            # Check if this AzDO PR was created by our mirror (has GitHub PR link)
            if echo "$azdo_desc" | grep -q "Mirrored from GitHub PR"; then
              # Check if it's still linked to an open GitHub PR
              if ! echo "$LINKED_AZDO_IDS" | grep -q "^${azdo_id}$"; then
                echo "  Abandoning orphaned AzDO PR #$azdo_id..."
                response=$(curl -s -X PATCH \
                  "${AZDO_API}/pullrequests/${azdo_id}?api-version=7.1" \
                  -H "Authorization: Bearer ${AZDO_TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d '{"status": "abandoned"}')
                if ! echo "$response" | jq -e '.pullRequestId' > /dev/null 2>&1; then
                  echo "    [WARN] Failed to abandon: $(echo "$response" | jq -c '.message // .')"
                fi
              else
                echo "  AzDO PR #$azdo_id is linked, keeping"
              fi
            fi
          done

          # Sync each GitHub PR to Azure DevOps
          echo "Syncing GitHub PRs to Azure DevOps..."
          pr_count=$(echo "$GH_PRS" | jq 'length')
          for ((i=0; i<pr_count; i++)); do
            gh_num=$(echo "$GH_PRS" | jq -r ".[$i].number")
            gh_title=$(echo "$GH_PRS" | jq -r ".[$i].title")
            gh_body=$(echo "$GH_PRS" | jq -r ".[$i].body // \"\"")
            gh_url=$(echo "$GH_PRS" | jq -r ".[$i].url")
            gh_head=$(echo "$GH_PRS" | jq -r ".[$i].headRefName")
            gh_base=$(echo "$GH_PRS" | jq -r ".[$i].baseRefName")

            description="Mirrored from GitHub PR #${gh_num}: ${gh_url}

          ---

          ${gh_body}"

            azdo_id=${GH_TO_AZDO[$gh_num]:-}

            if [ -n "$azdo_id" ]; then
              # Fetch current AzDO PR status to avoid invalid state transitions
              azdo_status=$(curl -s \
                "${AZDO_API}/pullrequests/${azdo_id}?api-version=7.1" \
                -H "Authorization: Bearer ${AZDO_TOKEN}" \
                | jq -r '.status // empty')

              # Don't try to reactivate a completed PR (merged PRs can't be reopened)
              if [ "$azdo_status" = "completed" ]; then
                echo "  Updating AzDO PR #$azdo_id for GH #$gh_num (completed, title/desc only)..."
                update_payload=$(jq -n \
                  --arg title "$gh_title" \
                  --arg desc "$description" \
                  '{title: $title, description: $desc}')
              else
                echo "  Updating AzDO PR #$azdo_id for GH #$gh_num..."
                update_payload=$(jq -n \
                  --arg title "$gh_title" \
                  --arg desc "$description" \
                  '{title: $title, description: $desc, status: "active"}')
              fi

              response=$(curl -s -X PATCH \
                "${AZDO_API}/pullrequests/${azdo_id}?api-version=7.1" \
                -H "Authorization: Bearer ${AZDO_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "$update_payload")
              if ! echo "$response" | jq -e '.pullRequestId' > /dev/null 2>&1; then
                echo "    [WARN] Failed to update: $(echo "$response" | jq -c '.message // .')"
              fi
            else
              # Create new AzDO PR
              echo "  Creating AzDO PR for GH #$gh_num..."
              RESPONSE=$(curl -s -X POST \
                "${AZDO_API}/pullrequests?api-version=7.1" \
                -H "Authorization: Bearer ${AZDO_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "$(jq -n \
                  --arg src "refs/heads/${gh_head}" \
                  --arg tgt "refs/heads/${gh_base}" \
                  --arg title "$gh_title" \
                  --arg desc "$description" \
                  '{sourceRefName: $src, targetRefName: $tgt, title: $title, description: $desc}')")

              new_azdo_id=$(echo "$RESPONSE" | jq -r '.pullRequestId')

              if [ "$new_azdo_id" != "null" ] && [ -n "$new_azdo_id" ]; then
                AZDO_PR_URL="https://dev.azure.com/${AZDO_ORG}/${AZDO_PROJECT}/_git/${AZDO_REPO}/pullrequest/${new_azdo_id}"
                gh pr comment "$gh_num" \
                  --body "<!-- azdo-mirror:${new_azdo_id} -->
          🔗 **Azure DevOps Mirror**: [PR #${new_azdo_id}](${AZDO_PR_URL})"
                echo "    Created AzDO PR #$new_azdo_id"
                GH_TO_AZDO[$gh_num]=$new_azdo_id
              else
                echo "    Failed to create AzDO PR: $RESPONSE"
              fi
            fi
          done

          # Export the mapping for comment sync step
          GH_TO_AZDO_JSON="{"
          first=true
          for key in "${!GH_TO_AZDO[@]}"; do
            if [ "$first" = true ]; then
              first=false
            else
              GH_TO_AZDO_JSON+=","
            fi
            GH_TO_AZDO_JSON+="\"$key\":\"${GH_TO_AZDO[$key]}\""
          done
          GH_TO_AZDO_JSON+="}"
          echo "GH_TO_AZDO_JSON=$GH_TO_AZDO_JSON" >> $GITHUB_OUTPUT
          echo "Exported mapping: $GH_TO_AZDO_JSON"

          echo "PR sync complete."
        id: pr-sync

      - name: Sync Comments
        env:
          AZDO_TOKEN: ${{ steps.azdo-token.outputs.token }}
          GH_TOKEN: ${{ github.token }}
          GH_TO_AZDO_JSON: ${{ steps.pr-sync.outputs.GH_TO_AZDO_JSON }}
        run: |
          set -e

          AZDO_API="https://dev.azure.com/${AZDO_ORG}/${AZDO_PROJECT}/_apis/git/repositories/${AZDO_REPO}"

          # Parse the PR mapping
          if [ -z "$GH_TO_AZDO_JSON" ] || [ "$GH_TO_AZDO_JSON" == "{}" ]; then
            echo "No linked PRs to sync comments for"
            exit 0
          fi

          linked_count=$(echo "$GH_TO_AZDO_JSON" | jq 'length')
          echo "Syncing comments for $linked_count linked PRs..."

          # Iterate through each linked PR pair
          for gh_num in $(echo "$GH_TO_AZDO_JSON" | jq -r 'keys[]'); do
            azdo_id=$(echo "$GH_TO_AZDO_JSON" | jq -r --arg k "$gh_num" '.[$k]')
            echo "Processing GH #$gh_num -> AzDO #$azdo_id"

            # Fetch GitHub PR comments (conversation comments)
            GH_COMMENTS=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${gh_num}/comments" --paginate 2>/dev/null || echo '[]')
            echo "    Found $(echo "$GH_COMMENTS" | jq 'length') conversation comments"

            # Fetch GitHub PR review comments (inline code comments)
            GH_REVIEW_COMMENTS=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${gh_num}/comments" --paginate 2>/dev/null || echo '[]')
            echo "    Found $(echo "$GH_REVIEW_COMMENTS" | jq 'length') review comments"

            # Fetch GitHub PR reviews (review summaries)
            GH_REVIEWS=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${gh_num}/reviews" --paginate 2>/dev/null || echo '[]')
            echo "    Found $(echo "$GH_REVIEWS" | jq 'length') reviews"

            # Fetch existing AzDO threads to check what's already synced
            AZDO_THREADS=$(curl -s \
              "${AZDO_API}/pullrequests/${azdo_id}/threads?api-version=7.1" \
              -H "Authorization: Bearer ${AZDO_TOKEN}" \
              | jq '.value // []')
            echo "    Found $(echo "$AZDO_THREADS" | jq 'length') existing AzDO threads"

            # Extract already-synced GitHub comment IDs from AzDO thread content
            SYNCED_IDS=$(echo "$AZDO_THREADS" | jq -r '.[].comments[]?.content // empty' \
              | grep -o '<!-- gh-comment:[^ ]*' \
              | sed 's/<!-- gh-comment://' || true)
            synced_count=$(echo "$SYNCED_IDS" | grep -c . || echo 0)
            echo "    Already synced: $synced_count comments"

            # Sync conversation comments
            comment_count=$(echo "$GH_COMMENTS" | jq 'length')
            conv_synced=0
            conv_skipped=0
            echo "    Processing $comment_count conversation comments..."
            for ((j=0; j<comment_count; j++)); do
              comment_id=$(echo "$GH_COMMENTS" | jq -r ".[$j].id")

              # Skip if already synced or is the mirror link comment
              if echo "$SYNCED_IDS" | grep -q "^comment-${comment_id}$"; then
                conv_skipped=$((conv_skipped + 1))
                continue
              fi

              body=$(echo "$GH_COMMENTS" | jq -r ".[$j].body // \"\"")

              # Skip our own mirror comments
              if echo "$body" | grep -q '<!-- azdo-mirror:'; then
                conv_skipped=$((conv_skipped + 1))
                echo "      -> Skipping mirror comment #$comment_id"
                continue
              fi

              author=$(echo "$GH_COMMENTS" | jq -r ".[$j].user.login")
              html_url=$(echo "$GH_COMMENTS" | jq -r ".[$j].html_url")

              echo "      -> Syncing conversation comment #$comment_id from @$author"

              # Build content and JSON payload
              content="<!-- gh-comment:comment-${comment_id} -->
          **[@${author}](https://github.com/${author})** commented on [GitHub](${html_url}):

          ---

          ${body}"

              payload=$(jq -n --arg content "$content" '{comments: [{parentCommentId: 0, content: $content, commentType: 1}], status: 1}')
              echo "        Payload size: ${#payload} bytes"

              response=$(curl -s -X POST \
                "${AZDO_API}/pullrequests/${azdo_id}/threads?api-version=7.1" \
                -H "Authorization: Bearer ${AZDO_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "$payload")

              if echo "$response" | jq -e '.id' > /dev/null 2>&1; then
                conv_synced=$((conv_synced + 1))
                echo "        Created thread ID: $(echo "$response" | jq -r '.id')"
              else
                echo "        [WARN] Failed to create thread: $(echo "$response" | jq -c '.message // .')"
              fi
            done
            echo "    Conversation comments: $conv_synced synced, $conv_skipped skipped"

            # Sync review comments (inline code comments)
            review_comment_count=$(echo "$GH_REVIEW_COMMENTS" | jq 'length')
            inline_synced=0
            inline_skipped=0
            echo "    Processing $review_comment_count inline review comments..."
            for ((j=0; j<review_comment_count; j++)); do
              comment_id=$(echo "$GH_REVIEW_COMMENTS" | jq -r ".[$j].id")

              if echo "$SYNCED_IDS" | grep -q "^review-comment-${comment_id}$"; then
                inline_skipped=$((inline_skipped + 1))
                continue
              fi

              body=$(echo "$GH_REVIEW_COMMENTS" | jq -r ".[$j].body // \"\"")
              author=$(echo "$GH_REVIEW_COMMENTS" | jq -r ".[$j].user.login")
              path=$(echo "$GH_REVIEW_COMMENTS" | jq -r ".[$j].path")
              line=$(echo "$GH_REVIEW_COMMENTS" | jq -r ".[$j].line // empty")
              start_line=$(echo "$GH_REVIEW_COMMENTS" | jq -r ".[$j].start_line // empty")
              original_line=$(echo "$GH_REVIEW_COMMENTS" | jq -r ".[$j].original_line // empty")
              original_start_line=$(echo "$GH_REVIEW_COMMENTS" | jq -r ".[$j].original_start_line // empty")
              side=$(echo "$GH_REVIEW_COMMENTS" | jq -r ".[$j].side // \"RIGHT\"")
              start_side=$(echo "$GH_REVIEW_COMMENTS" | jq -r ".[$j].start_side // empty")
              html_url=$(echo "$GH_REVIEW_COMMENTS" | jq -r ".[$j].html_url")

              # Determine line range for display
              if [ -n "$start_line" ] && [ "$start_line" != "$line" ]; then
                display_line="${start_line}-${line}"
              elif [ -n "$line" ]; then
                display_line="$line"
              elif [ -n "$original_start_line" ] && [ "$original_start_line" != "$original_line" ]; then
                display_line="${original_start_line}-${original_line}"
              else
                display_line="${original_line:-?}"
              fi

              echo "      -> Syncing inline comment #$comment_id from @$author on $path:$display_line ($side)"

              content="<!-- gh-comment:review-comment-${comment_id} -->
          **[@${author}](https://github.com/${author})** commented on [GitHub](${html_url}) (\`${path}:${display_line}\`):

          ---

          ${body}"

              # Build thread context for inline placement
              # AzDO uses rightFileStart/End for new code, leftFileStart/End for old code
              # GitHub comments can span both sides (cross-side comments)
              if [ "$start_side" = "LEFT" ] && [ "$side" = "RIGHT" ] && [ -n "$original_line" ] && [ -n "$line" ]; then
                # Cross-side comment: starts on LEFT, ends on RIGHT
                left_start="${original_start_line:-$original_line}"
                right_end="$line"
                thread_context=$(jq -n \
                  --arg path "/$path" \
                  --argjson lstart "$left_start" \
                  --argjson lend "$original_line" \
                  --argjson rstart "$left_start" \
                  --argjson rend "$right_end" \
                  '{filePath: $path, leftFileStart: {line: $lstart, offset: 1}, leftFileEnd: {line: $lend, offset: 1}, rightFileStart: {line: $rstart, offset: 1}, rightFileEnd: {line: $rend, offset: 1}}')
                echo "        Thread context: CROSS-SIDE, LEFT $left_start-$original_line, RIGHT $left_start-$right_end"
              elif [ "$side" = "LEFT" ] && [ -n "$original_line" ]; then
                # LEFT side only comment
                left_start="${original_start_line:-$original_line}"
                thread_context=$(jq -n \
                  --arg path "/$path" \
                  --argjson start "$left_start" \
                  --argjson end "$original_line" \
                  '{filePath: $path, leftFileStart: {line: $start, offset: 1}, leftFileEnd: {line: $end, offset: 1}}')
                echo "        Thread context: LEFT side, lines $left_start-$original_line"
              elif [ -n "$line" ]; then
                # RIGHT side only comment
                right_start="${start_line:-$line}"
                thread_context=$(jq -n \
                  --arg path "/$path" \
                  --argjson start "$right_start" \
                  --argjson end "$line" \
                  '{filePath: $path, rightFileStart: {line: $start, offset: 1}, rightFileEnd: {line: $end, offset: 1}}')
                echo "        Thread context: RIGHT side, lines $right_start-$line"
              else
                # Fallback: no line context, just file path
                thread_context=$(jq -n --arg path "/$path" '{filePath: $path}')
                echo "        Thread context: file-level only (no line)"
              fi

              payload=$(jq -n \
                --arg content "$content" \
                --argjson ctx "$thread_context" \
                '{comments: [{parentCommentId: 0, content: $content, commentType: 1}], threadContext: $ctx, status: 1}')
              echo "        Payload size: ${#payload} bytes"

              response=$(curl -s -X POST \
                "${AZDO_API}/pullrequests/${azdo_id}/threads?api-version=7.1" \
                -H "Authorization: Bearer ${AZDO_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "$payload")

              if echo "$response" | jq -e '.id' > /dev/null 2>&1; then
                inline_synced=$((inline_synced + 1))
                echo "        Created thread ID: $(echo "$response" | jq -r '.id')"
              else
                echo "        [WARN] Failed to create thread: $(echo "$response" | jq -c '.message // .')"
              fi
            done
            echo "    Inline review comments: $inline_synced synced, $inline_skipped skipped"

            # Sync review summaries (approve/request changes/comment)
            review_count=$(echo "$GH_REVIEWS" | jq 'length')
            review_synced=0
            review_skipped=0
            echo "    Processing $review_count review summaries..."
            for ((j=0; j<review_count; j++)); do
              review_id=$(echo "$GH_REVIEWS" | jq -r ".[$j].id")

              if echo "$SYNCED_IDS" | grep -q "^review-${review_id}$"; then
                review_skipped=$((review_skipped + 1))
                continue
              fi

              body=$(echo "$GH_REVIEWS" | jq -r ".[$j].body // \"\"")
              state=$(echo "$GH_REVIEWS" | jq -r ".[$j].state")
              author=$(echo "$GH_REVIEWS" | jq -r ".[$j].user.login")
              html_url=$(echo "$GH_REVIEWS" | jq -r ".[$j].html_url")

              # Skip empty reviews (just approvals without comment body)
              if [ -z "$body" ] && [ "$state" != "CHANGES_REQUESTED" ]; then
                review_skipped=$((review_skipped + 1))
                echo "      -> Skipping empty review #$review_id ($state) from @$author"
                continue
              fi

              case "$state" in
                APPROVED) state_label="✅ Approved" ;;
                CHANGES_REQUESTED) state_label="🔄 Changes Requested" ;;
                COMMENTED) state_label="💬 Reviewed" ;;
                DISMISSED) state_label="❌ Dismissed" ;;
                *) state_label="📝 $state" ;;
              esac

              echo "      -> Syncing review #$review_id ($state) from @$author"

              content="<!-- gh-comment:review-${review_id} -->
          **[@${author}](https://github.com/${author})** ${state_label} on [GitHub](${html_url}):

          ---

          ${body}"

              payload=$(jq -n --arg content "$content" '{comments: [{parentCommentId: 0, content: $content, commentType: 1}], status: 1}')
              echo "        Payload size: ${#payload} bytes"

              response=$(curl -s -X POST \
                "${AZDO_API}/pullrequests/${azdo_id}/threads?api-version=7.1" \
                -H "Authorization: Bearer ${AZDO_TOKEN}" \
                -H "Content-Type: application/json" \
                -d "$payload")

              if echo "$response" | jq -e '.id' > /dev/null 2>&1; then
                review_synced=$((review_synced + 1))
                echo "        Created thread ID: $(echo "$response" | jq -r '.id')"
              else
                echo "        [WARN] Failed to create thread: $(echo "$response" | jq -c '.message // .')"
              fi
            done
            echo "    Review summaries: $review_synced synced, $review_skipped skipped"

            echo "  PR #$gh_num sync complete: conv=$conv_synced, inline=$inline_synced, reviews=$review_synced"
          done

          echo "Comment sync complete."
